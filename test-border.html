<!DOCTYPE html>
<html>
<body style="margin:0; background: #222; height: 100vh;">
  <div style="filter: drop-shadow(0px 0px 30px rgba(0,0,0,1)); width: 100%; height: 100%;">
    <div id="hole" style="width: 100%; height: 100%; background: #eee; clip-path: polygon(50% 10%, 90% 50%, 50% 90%, 10% 50%);"></div>
  </div>
  <svg style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;">
    <polygon id="poly" fill="none" stroke="#f00" stroke-width="4" points="" />
  </svg>
  <script>
    var w = window.innerWidth;
    var h = window.innerHeight;
    var pts = [[w*0.5, h*0.1], [w*0.9, h*0.5], [w*0.5, h*0.9], [w*0.1, h*0.5]];
    var poly = document.getElementById('poly');
    poly.setAttribute('points', pts.map(p => p[0]+','+p[1]).join(' '));
  </script>
</body>
</html>
