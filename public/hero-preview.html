<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NextWork - Build AI Projects. Generate a Portfolio.</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Source+Serif+4:wght@300;400;600&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --leather: #1b1918;
                --paper: #f8f5f0;
                --pure-black: #000000;
                --pure-white: #ffffff;
                --sand: #e5dcc7;
                --plum: #965ecd;
                --cornflower: #308ded;
                --canary: #fedd2d;
                --pumpkin: #fa8a45;
                --emerald: #12cca6;
                --font-ui: "Inter", system-ui, sans-serif;
                --font-body: "Source Serif 4", Georgia, serif;
            }

            html,
            body {
                height: 100%;
                background: var(--paper);
                color: var(--leather);
                font-family: var(--font-ui);
                font-size: 15px;
                line-height: 1.6;
                -webkit-font-smoothing: antialiased;
            }

            /* ===== NAVIGATION ===== */
            .nav {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 100;
                background: rgba(248, 245, 240, 0.85);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border-bottom: 1px solid rgba(27, 25, 24, 0.06);
            }

            .nav-inner {
                max-width: 1280px;
                margin: 0 auto;
                padding: 0 32px;
                height: 64px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .nav-logo {
                display: flex;
                align-items: center;
                gap: 8px;
                text-decoration: none;
                color: var(--leather);
                font-weight: 700;
                font-size: 18px;
                letter-spacing: -0.02em;
            }

            .nav-logo svg {
                width: 32px;
                height: 32px;
                flex-shrink: 0;
            }

            .nav-links {
                display: flex;
                align-items: center;
                gap: 32px;
                list-style: none;
            }

            .nav-links a {
                text-decoration: none;
                color: var(--leather);
                font-size: 15px;
                font-weight: 500;
                transition: opacity 0.2s;
            }

            .nav-links a:hover {
                opacity: 0.6;
            }

            .nav-cta {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 10px 20px;
                background: var(--leather);
                color: var(--paper);
                border-radius: 9999px;
                text-decoration: none;
                font-size: 14px;
                font-weight: 600;
                letter-spacing: -0.01em;
                transition:
                    background 0.2s,
                    transform 0.15s;
            }

            .nav-cta:hover {
                background: #000;
                transform: scale(1.02);
            }

            .nav-cta svg {
                width: 14px;
                height: 14px;
                flex-shrink: 0;
            }

            /* ===== HERO SECTION ===== */
            .hero {
                min-height: 100vh;
                display: flex;
                align-items: center;
                padding-top: 64px;
            }

            .hero-container {
                max-width: 1280px;
                margin: 0 auto;
                padding: 80px 32px;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 80px;
                align-items: center;
                width: 100%;
            }

            .hero-content {
                display: flex;
                flex-direction: column;
                gap: 24px;
            }

            .hero-headline {
                font-family: var(--font-ui);
                font-size: clamp(48px, 6vw, 80px);
                font-weight: 800;
                line-height: 1.05;
                letter-spacing: -0.03em;
                color: var(--leather);
                margin: 0;
            }

            .hero-subtitle {
                font-family: var(--font-body);
                font-size: clamp(18px, 2.2vw, 22px);
                font-weight: 400;
                line-height: 1.5;
                color: #5c5856;
                margin: 0;
                max-width: 480px;
            }

            .hero-trust {
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .hero-avatars {
                display: flex;
                margin-right: 4px;
            }

            .hero-avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                border: 2px solid var(--paper);
                background: var(--sand);
                margin-left: -8px;
                display: block;
            }

            .hero-avatar:first-child {
                margin-left: 0;
            }

            .hero-trust-text {
                font-size: 14px;
                font-weight: 500;
                color: #5c5856;
                letter-spacing: -0.01em;
            }

            .hero-cta {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                padding: 16px 32px;
                background: var(--leather);
                color: var(--paper);
                border-radius: 9999px;
                text-decoration: none;
                font-size: 16px;
                font-weight: 600;
                letter-spacing: -0.01em;
                transition:
                    background 0.2s,
                    transform 0.15s,
                    box-shadow 0.2s;
                align-self: flex-start;
                box-shadow: 0 2px 12px rgba(27, 25, 24, 0.12);
            }

            .hero-cta:hover {
                background: #000;
                transform: translateY(-1px);
                box-shadow: 0 6px 24px rgba(27, 25, 24, 0.18);
            }

            .hero-cta svg {
                width: 18px;
                height: 18px;
                flex-shrink: 0;
                transition: transform 0.2s;
            }

            .hero-cta:hover svg {
                transform: translateX(3px);
            }

            /* ===== GLOBE VISUAL ===== */
            .hero-visual {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .globe-wrap {
                position: relative;
                width: 100%;
                max-width: 480px;
                aspect-ratio: 1;
            }

            .globe-svg {
                width: 100%;
                height: 100%;
            }

            .globe-sphere {
                fill: none;
                stroke: var(--sand);
                stroke-width: 1.5;
            }

            .globe-continent {
                fill: var(--sand);
                opacity: 0.6;
                transition: opacity 0.3s;
            }

            .globe-dot {
                fill: var(--cornflower);
                opacity: 0.9;
            }

            /* ===== RESPONSIVE ===== */
            @media (max-width: 900px) {
                .hero-container {
                    grid-template-columns: 1fr;
                    gap: 48px;
                    padding: 48px 24px;
                }

                .hero-headline {
                    font-size: clamp(36px, 8vw, 56px);
                }

                .hero-visual {
                    order: -1;
                    max-width: 320px;
                    margin: 0 auto;
                }

                .nav-links {
                    display: none;
                }

                .nav-inner {
                    padding: 0 20px;
                }
            }

            @media (max-width: 480px) {
                .hero-headline {
                    font-size: 36px;
                }

                .hero-subtitle {
                    font-size: 16px;
                }

                .hero-cta {
                    padding: 14px 24px;
                    font-size: 15px;
                }

                .nav-inner {
                    height: 56px;
                }
            }
        </style>
    </head>
    <body>

                                />
                            </g>
                        </g>
                        <defs>
                            <clipPath id="nav-clip">
                                <rect width="256" height="256" fill="white" />
                            </clipPath>
                        </defs>
                    </svg>
                    NextWork
                </a>

                <ul class="nav-links">
                    <li><a href="#">Projects</a></li>
                    <li><a href="#">Community</a></li>
                    <li><a href="#">About</a></li>
                </ul>

                <a href="#" class="nav-cta">
                    Start Your First Project

            </div>
        </nav>
