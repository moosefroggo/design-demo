<!DOCTYPE html>
<html>
<body style="margin:0; background: #222; height: 100vh;">
  <!-- wrapper with clip-path -->
  <div id="wrapper" style="position:absolute;inset:0;clip-path:polygon(50% 10%, 90% 50%, 50% 90%, 10% 50%);">
    <!-- iframe content -->
    <div style="width:100%;height:100%;background:#eee;"></div>
    
    <!-- inner shadow -->
    <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;">
      <!-- blurred stroke creates shadow -->
      <polygon id="shadow" fill="none" stroke="rgba(0,0,0,0.8)" stroke-width="50" filter="blur(15px)" points="" />
      <!-- sharp stroke creates border -->
      <polygon id="border" fill="none" stroke="#f00" stroke-width="4" points="" />
    </svg>
  </div>
  <script>
    var w = window.innerWidth;
    var h = window.innerHeight;
    var pts = [[w*0.5, h*0.1], [w*0.9, h*0.5], [w*0.5, h*0.9], [w*0.1, h*0.5]];
    var ptsStr = pts.map(p => p[0]+','+p[1]).join(' ');
    document.getElementById('shadow').setAttribute('points', ptsStr);
    document.getElementById('border').setAttribute('points', ptsStr);
  </script>
</body>
</html>
